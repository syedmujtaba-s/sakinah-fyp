org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disabled after the project folder rename: Kotlin's incremental cache stores
# absolute paths from before the move, and parallel Gradle workers register
# the same cache files twice -> "Storage for X is already registered" crash.
# Slower clean builds, but reliable. Re-enable after a few clean builds prove
# the cache state is consistent.
kotlin.incremental=false
org.gradle.parallel=false
